# Data-scaling run: 5k formula-conditioned samples on one 48GB CUDA GPU.

model_path: /mnt/data/kimariyb/models/Qwen3-VL-8B-Instruct
max_seq_length: 4096
load_in_4bit: true
use_gradient_checkpointing: false

dataset_dir: dataset/paired_jsonl_full
image_backend: pre_rendered
rendered_image_dir: dataset/paired_jsonl_full/rendered/768x432
missing_image_policy: error
train_split_name: clean_5k_train
eval_split_name: clean_50k_val
include_formula: true
h_snr: 500.0
c_snr: 300.0
render_seed: 3407
image_size: [768, 432]
max_eval_samples: 5000

dry_run: false
output_dir: outputs/experiments/structure/scale-5k-formula-seed3407
per_device_train_batch_size: 16
per_device_eval_batch_size: 4
gradient_accumulation_steps: 2
dataloader_num_workers: 4
dataloader_prefetch_factor: 2
dataloader_persistent_workers: true
dataloader_pin_memory: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.0
num_train_epochs: 2
learning_rate: 2.0e-4
weight_decay: 0.01
warmup_steps: 20
lr_scheduler_type: cosine_with_restarts
optim: adamw_8bit
bf16: true
fp16: false
logging_steps: 10
eval_steps: 100
save_steps: 100
save_total_limit: 3
seed: 3407
