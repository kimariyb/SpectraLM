num_train_epochs: 2
learning_rate: 5.0e-5
weight_decay: 0.01
warmup_steps: 40
lr_scheduler_type: cosine
optim: adamw_8bit
bf16: true
fp16: false
logging_steps: 10
eval_steps: 40
save_steps: 40
early_stopping_patience: 3
