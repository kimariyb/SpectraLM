# SpectraLM CUDA smoke training configuration
# Run this first on the CUDA server before launching the full run.

# Model
model_path: /mnt/data/kimariyb/models/Qwen3-VL-8B-Instruct
max_seq_length: 4096
load_in_4bit: true
use_gradient_checkpointing: unsloth

# Dataset
dataset_dir: dataset/paired_jsonl_full
image_backend: pre_rendered
rendered_image_dir: dataset/paired_jsonl_full/rendered/768x432
missing_image_policy: error
train_split_name: clean_50k_train
eval_split_name: clean_50k_val
include_formula: true
h_snr: 500.0
c_snr: 300.0
render_seed: 3407
image_size: [768, 432]
max_train_samples: 2048
max_eval_samples: 256

# Training
dry_run: false
output_dir: outputs/cuda-smoke-qwen3-vl-8b
per_device_train_batch_size: 2
per_device_eval_batch_size: 8
gradient_accumulation_steps: 4
dataloader_num_workers: 2
dataloader_prefetch_factor: 2
dataloader_persistent_workers: true
dataloader_pin_memory: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.0
num_train_epochs: 1
max_steps: 20
learning_rate: 2.0e-4
weight_decay: 0.01
warmup_steps: 2
lr_scheduler_type: cosine_with_restarts
optim: adamw_8bit
bf16: true
fp16: false
logging_steps: 1
eval_steps: 10
save_steps: 10
save_total_limit: 2
seed: 3407
