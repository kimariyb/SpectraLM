# SpectraLM LoRA/QLoRA fine-tuning configuration
# Usage: python -m src.training.train configs/train.yaml

# Model
model_path: /mnt/data/kimariyb/models/Qwen3-VL-8B-Instruct
max_seq_length: 8192
load_in_4bit: true

# Dataset
dataset_dir: dataset/subsets
train_size: 1600
train_cache_dir: cache/train
eval_cache_dir: cache/test
cache_version: "v1"             

# Training
output_dir: outputs/spectralm-qwen3-vl-8b
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
lora_r: 16
lora_alpha: 16
# max_steps: 30                  # uncomment for step-based training
num_train_epochs: 3              # uncomment for epoch-based training
learning_rate: 2.0e-5
warmup_steps: 5
logging_steps: 5
save_steps: 50
eval_steps: 5
weight_decay: 0.001
seed: 3407
