# SpectraLM inference configuration
# Usage: python -m src.training.inference configs/inference.yaml
#
# Ablation modes (mode key):
#   image_table_rule  — full input: images + peak tables + rules
#   image_table       — images + peak tables, no rules
#   table_only        — peak tables only, no images
#   image_only        — images only, no peak tables or rules

# ---------------------------------------------------------------------------
# Model
# ---------------------------------------------------------------------------
model_path: outputs/spectralm-butina-qwen3-vl-8b
max_seq_length: 8192

# ---------------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------------
test_dataset: dataset/subsets/spectralm_butina_1000_300/test.pkl
mode: image_table_rule               # ablation mode
max_samples: null                    # null = all, or set a number
max_new_tokens: 256

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
output: outputs/predictions.jsonl
